<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Display e Position</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1> Propriedades Position e Display no CSS</h1>

    <h2>display: block</h2>
    <p>Ocupa toda a linha.</p>
    <div class="block exemplo">
        <div class="box">1</div>
        <div class="box">2</div>
    </div>

    <h2>display: inline</h2>
    <p>Fica na mesma linha.</p>
    <div class="inline exemplo">
        <div class="box">1</div>
        <div class="box">2</div>
    </div>

    <h2>display: inline-block</h2>
    <p>Fica na mesma linha e aceita tamanho.</p>
    <div class="inline-block exemplo">
        <div class="box">1</div>
        <div class="box">2</div>
    </div>

    <h2>display: flex</h2>
    <p>Coloca os elementos lado a lado e facilita organizar.</p>
    <div class="flex exemplo">
        <div class="box">1</div>
        <div class="box">2</div>
    </div>


</body>

</html>
